name: GitHub Actions

on: [push]

jobs:
   build:
     runs-on: ubuntu-latest

     strategy:
       matrix:
         python-version: [3.10,3.12]

     steps:
       - uses: actions/checkout@v4
       - name: Set up Python
         uses: actions/setup-python@v6
         with:
           python-version:${{matrix.python-version}}

       - name: Run tests
         run: |
             cd src
             python -m pytest app.py

         